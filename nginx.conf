events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # SSL is handled by nginx-proxy or acme-companion if we use them,
    # but for simplicity with a single Azure URL, we can use a direct Nginx gateway.
    # However, if we want automated Let's Encrypt for the .cloudapp.azure.com,
    # nginxproxy/nginx-proxy still works if VIRTUAL_HOST is the same for multiple containers
    # (it will round-robin), which we DON'T want.
    
    # We'll use this Nginx as the SINGLE VIRTUAL_HOST container.
    
    server {
        listen 80;
        server_name agentlink.eastus.cloudapp.azure.com;

        # GraphQL API
        location /v1/ {
            proxy_pass http://hasura:8080/v1/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hasura Console
        location /console {
            proxy_pass http://hasura:8080/console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
