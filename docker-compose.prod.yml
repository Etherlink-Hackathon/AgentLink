services:
  # --- Reverse Proxy and SSL ---
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
    restart: always

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
    depends_on:
      - nginx-proxy
    environment:
      - DEFAULT_EMAIL=${SSL_EMAIL:-admin@agentlink.com}
    restart: always

  # --- Database ---
  db:
    image: postgres:15
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dipdup}
      - POSTGRES_DB=${POSTGRES_DB:-dipdup}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dipdup} -d ${POSTGRES_DB:-dipdup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Hasura (GraphQL API) ---
  hasura:
    image: hasura/graphql-engine:v2.35.0
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      - VIRTUAL_HOST=api.agentlink.com
      - LETSENCRYPT_HOST=api.agentlink.com
      - HASURA_GRAPHQL_DATABASE_URL=postgres://${POSTGRES_USER:-dipdup}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-dipdup}
      - HASURA_GRAPHQL_ENABLE_CONSOLE=true
      - HASURA_GRAPHQL_DEV_MODE=false
      - HASURA_GRAPHQL_ADMIN_SECRET=${ADMIN_SECRET:-changeme}
      - HASURA_GRAPHQL_UNAUTHORIZED_ROLE=user
      - HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES=true

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_GRAPHQL_URL=https://api.agentlink.com/v1/graphql
        - VITE_NETWORK_TYPE=mainnet
    restart: always
    environment:
      - VIRTUAL_HOST=agentlink.com, www.agentlink.com
      - LETSENCRYPT_HOST=agentlink.com, www.agentlink.com
    depends_on:
      - hasura

  # --- Core Indexer ---
  indexer:
    build:
      context: ./indexer
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_USER=${POSTGRES_USER:-dipdup}
      - POSTGRES_DB=${POSTGRES_DB:-dipdup}
      - RPC_URL=${RPC_URL:-https://node.mainnet.etherlink.com}
      - VAULT_ADDRESS=${VAULT_ADDRESS}

  # --- Wager Indexer ---
  wager-backend:
    build:
      context: ./wager-backend
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_USER=${POSTGRES_USER:-dipdup}
      - POSTGRES_DB=${POSTGRES_DB:-dipdup}
      - ADMIN_SECRET=${ADMIN_SECRET:-changeme}
      - RPC_URL=${RPC_URL:-https://node.mainnet.etherlink.com}

volumes:
  db_data:
  vhost:
  html:
  certs:
  acme:
