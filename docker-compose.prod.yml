services:
  # --- Reverse Proxy and SSL ---
  # We use nginx-proxy and acme-companion for zero-config SSL on the Azure domain.
  # We point them to a single 'gateway' service that handles path-based routing.
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
    restart: always

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
    depends_on:
      - nginx-proxy
    environment:
      - DEFAULT_EMAIL=${SSL_EMAIL:-admin@agentlink.com}
    restart: always

  # --- Gateway Nginx (Path-based routing) ---
  gateway:
    image: nginx:stable-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - VIRTUAL_HOST=agentlink.eastus.cloudapp.azure.com
      - LETSENCRYPT_HOST=agentlink.eastus.cloudapp.azure.com
    depends_on:
      - frontend
      - hasura
    restart: always

  # --- Database ---
  db:
    image: postgres:15
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-huydo}
      - POSTGRES_DB=${POSTGRES_DB:-huydo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-huydo2105}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-huydo} -d ${POSTGRES_DB:-huydo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Hasura (GraphQL API) ---
  hasura:
    image: hasura/graphql-engine:v2.35.0
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      - HASURA_GRAPHQL_DATABASE_URL=postgres://${POSTGRES_USER:-huydo}:${POSTGRES_PASSWORD:-huydo2105}@db:5432/${POSTGRES_DB:-huydo}
      - HASURA_GRAPHQL_ENABLE_CONSOLE=true
      - HASURA_GRAPHQL_DEV_MODE=false
      - HASURA_GRAPHQL_ADMIN_SECRET=${ADMIN_SECRET:-huydo2105}
      - HASURA_GRAPHQL_UNAUTHORIZED_ROLE=user
      - HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES=true

  # --- Frontend ---
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - VITE_GRAPHQL_URL=https://agentlink.eastus.cloudapp.azure.com/v1/graphql
        - VITE_NETWORK_TYPE=mainnet
        - VITE_NODE_ENV=production
        - VITE_STATS=TRUE
        - VITE_AMPLITUDE=2b33eb4dc7dfca637280cb2d0e56a25
        - VITE_VAULT_ADDRESS=0x895Ea1c1A1EF1EceF0Fb822e33BE0bB9d493559d
    restart: always
    depends_on:
      - hasura

  # --- Indexer ---
  indexer:
    build:
      context: ./indexer
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-huydo2105}
      - POSTGRES_USER=${POSTGRES_USER:-huydo}
      - POSTGRES_DB=${POSTGRES_DB:-huydo}
      - ADMIN_SECRET=${ADMIN_SECRET:-huydo2105}
      - ETHERSCAN_URL=${ETHERSCAN_URL:-https://api.etherscan.io/v2/api?chainId=}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-XYPSYD24WG49NSWHWCF9VE9HNKF21Z2KM2}
      - RPC_URL=${RPC_URL:-https://node.mainnet.etherlink.com}
      - SUBSQUID_URL=${SUBSQUID_URL:-https://v2.archive.subsquid.io/network/etherlink-mainnet}
      - VAULT_ADDRESS=0x895Ea1c1A1EF1EceF0Fb822e33BE0bB9d493559d
      - GEMINI_API_KEY=${GOOGLE_API_KEY:-}
      - STRATEGIST_PRIVATE_KEY=${STRATEGIST_PRIVATE_KEY:-}

volumes:
  db_data:
  vhost:
  html:
  certs:
  acme:
